<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICC 世界杯快問快答</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <section id="landing" class="landing-card">
  <div class="landing-badge">ICC WORLD CUP CHALLENGE</div>

  <div class="landing-hero">
    <div class="trophy-icon">🏆</div>
    <h1>世界杯<br>快問快答</h1>
    <p>90 秒內答最多題，挑戰你的世界杯知識！</p>
  </div>

  <div class="badge-box">
    <label for="badgeInput">請輸入 Badge Number</label>
    <input id="badgeInput" placeholder="例如：123456" />
    <button onclick="showRules()">開始挑戰 ⚽</button>
  </div>
</section>

    <section id="game" class="hidden">
      <h1>⚽ 世界杯快問快答</h1>

      <div class="top-bar">
        <div class="status-box">🏆 分數：<span id="score">0</span></div>
        <div class="status-box">⏰ <span id="gameTime">40.0</span>s</div>
      </div>

      <div class="question-card">
  <div class="question-number">第 <span id="questionNo">1</span> 題</div>
  <img id="questionImage" class="question-image hidden" />
  <div id="questionText" class="question"></div>
</div>

      <div id="options" class="options"></div>
    </section>

    <section id="end" class="card hidden">
      <h1>🎉 挑戰完成！</h1>
      <p>Badge Number：<span id="finalBadge"></span></p>
      <p>你的分數：</p>
      <div class="final-score"><span id="finalScore">0</span> 分</div>
      <p>最高連續答對：<span id="bestStreak">0</span> 題</p>
      <button onclick="location.reload()">再玩一次</button>
    </section>
  </div>

  <div id="rulesPopup" class="popup hidden">
    <div class="popup-box">
      <div class="result-title">📋 遊戲規則</div>
      <p class="rules-text">
  每局限時 <strong>90 秒</strong><br>
  答對 +1 分<br>
  答錯不扣分<br>
  遊戲開放期內，每位同事最多挑戰 2 次<br>
  以較高分成績為準
</p>
      </p>
      <button onclick="startGame()">開始遊戲</button>
    </div>
  </div>

  <div id="resultPopup" class="popup hidden">
    <div class="popup-box">
      <div id="popupTitle" class="result-title"></div>
      <p>正確答案：</p>
      <h2 id="correctAnswerText"></h2>
    </div>
  </div>
<div id="loadingOverlay" class="loading-overlay hidden">
  <div class="loading-box">
    <div class="loading-ball">⚽</div>
    <h2 id="loadingTitle">正在載入題庫...</h2>
    <p id="loadingText">請稍候，系統正在準備比賽</p>
  </div>
</div>
  <script src="script.js"></script>
</body>
</html>
