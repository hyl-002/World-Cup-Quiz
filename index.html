<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICC 世界杯快問快答</title>

  <style>
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(#7ecbff 0%, #dff5ff 45%, #3bbf59 45%, #1f8f3a 100%);
      min-height: 100vh;
      color: #163b72;
      text-align: center;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 24px 18px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 8px 0 #0f6b2d;
      margin-top: 30px;
    }

    h1 {
      font-size: 30px;
      color: #163b72;
      margin-bottom: 10px;
    }

    input {
      width: 90%;
      padding: 14px;
      border-radius: 14px;
      border: 2px solid #163b72;
      font-size: 20px;
      text-align: center;
      margin: 16px 0;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 16px;
      background: #ffd54a;
      color: #163b72;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 0 #d49b00;
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #d49b00;
    }

    .hidden {
      display: none;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 16px;
      font-weight: bold;
    }

    .status-box {
      background: #ffffffcc;
      padding: 10px;
      border-radius: 14px;
      flex: 1;
    }

    .question-card {
      background: white;
      border-radius: 24px;
      padding: 24px;
      margin: 16px 0;
      box-shadow: 0 8px 0 #0f6b2d;
    }

    .question-number {
      color: #2fa84f;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .question {
      font-size: 24px;
      font-weight: bold;
      line-height: 1.4;
    }

    .options button {
      background: white;
      box-shadow: 0 5px 0 #163b72;
      border: 3px solid #163b72;
      margin: 9px 0;
      text-align: left;
      color: #163b72;
    }

    .question-timer {
      margin-top: 16px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      background: #163b72;
      border-radius: 14px;
      padding: 10px;
    }

    .danger {
      color: #e60000;
      animation: flash 0.6s infinite;
    }

    @keyframes flash {
      50% { opacity: 0.4; }
    }

    .popup {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .popup-box {
      width: 82%;
      max-width: 420px;
      background: white;
      border-radius: 26px;
      padding: 28px;
      box-shadow: 0 8px 0 #163b72;
      animation: pop 0.2s ease-out;
    }

    @keyframes pop {
      from { transform: scale(0.85); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .result-title {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .correct { color: #20a447; }
    .wrong { color: #e63946; }
    .timeout { color: #f28c28; }

    .final-score {
      font-size: 54px;
      font-weight: bold;
      color: #2fa84f;
      margin: 12px 0;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Landing -->
    <section id="landing" class="card">
      <h1>⚽ ICC 世界杯快問快答</h1>
      <p>請輸入你的員工 Badge Number 開始挑戰</p>
      <input id="badgeInput" placeholder="Badge Number" />
      <button onclick="showRules()">開始挑戰</button>
    </section>

    <!-- Game -->
    <section id="game" class="hidden">
      <h1>⚽ 世界杯快問快答</h1>

      <div class="top-bar">
        <div class="status-box">🏆 分數：<span id="score">0</span></div>
        <div class="status-box">⏰ <span id="gameTime">40.0</span>s</div>
      </div>

      <div class="question-card">
        <div class="question-number">第 <span id="questionNo">1</span> 題</div>
        <div id="questionText" class="question"></div>
      </div>

      <div id="options" class="options"></div>

      <div class="question-timer">
        本題剩餘：<span id="questionTime">5.0</span>s
      </div>
    </section>

    <!-- End -->
    <section id="end" class="card hidden">
      <h1>🎉 挑戰完成！</h1>
      <p>Badge Number：<span id="finalBadge"></span></p>
      <p>你的分數：</p>
      <div class="final-score"><span id="finalScore">0</span> 分</div>
      <p>最高連續答對：<span id="bestStreak">0</span> 題</p>
      <button onclick="location.reload()">再玩一次</button>
    </section>

  </div>

  <!-- Popup -->
  <div id="popup" class="popup hidden">
    <div class="popup-box">
      <div id="popupTitle" class="result-title"></div>
      <p>正確答案：</p>
      <h2 id="correctAnswerText"></h2>
      <button id="startBtn" class="hidden" onclick="startGame()">開始遊戲</button>
    </div>
  </div>

  <script>
    const questions = [
      { question: "2022年世界杯冠軍係邊隊？", options: ["阿根廷", "法國", "巴西", "德國"], answer: 0 },
      { question: "2018年世界杯冠軍係邊隊？", options: ["法國", "克羅地亞", "英格蘭", "比利時"], answer: 0 },
      { question: "世界杯通常幾多年舉辦一次？", options: ["2年", "3年", "4年", "5年"], answer: 2 },
      { question: "美斯代表邊個國家隊？", options: ["巴西", "阿根廷", "葡萄牙", "西班牙"], answer: 1 },
      { question: "C朗代表邊個國家隊？", options: ["葡萄牙", "阿根廷", "法國", "意大利"], answer: 0 },
      { question: "巴西曾經贏過幾多次世界杯？", options: ["3次", "4次", "5次", "6次"], answer: 2 },
      { question: "第一屆世界杯喺邊一年舉行？", options: ["1926", "1930", "1934", "1938"], answer: 1 },
      { question: "第一屆世界杯主辦國係邊個？", options: ["巴西", "烏拉圭", "阿根廷", "意大利"], answer: 1 },
      { question: "2022年世界杯喺邊個國家舉行？", options: ["卡塔爾", "俄羅斯", "巴西", "南非"], answer: 0 },
      { question: "2010年世界杯冠軍係邊隊？", options: ["荷蘭", "德國", "西班牙", "阿根廷"], answer: 2 }
    ];

    let badgeNumber = "";
    let gameTimeLeft = 40;
    let questionTimeLeft = 5;
    let score = 0;
    let questionCount = 0;
    let currentStreak = 0;
    let bestStreak = 0;
    let currentQuestion;
    let questionPool = [];
    let gameTimer;
    let questionTimer;
    let isPaused = false;
    let hasAnswered = false;

    function showRules() {
      const input = document.getElementById("badgeInput").value.trim();

      if (!input) {
        alert("請先輸入 Badge Number");
        return;
      }

      badgeNumber = input;

      document.getElementById("popupTitle").innerHTML = "📋 遊戲規則";
      document.getElementById("popupTitle").className = "result-title";
      document.getElementById("correctAnswerText").innerHTML =
        "40秒內答越多題越好<br>每題限時5秒<br>答題提示時間不計入遊戲時間";
      document.getElementById("startBtn").classList.remove("hidden");
      document.getElementById("popup").classList.remove("hidden");
    }

    function startGame() {
      document.getElementById("landing").classList.add("hidden");
      document.getElementById("game").classList.remove("hidden");
      document.getElementById("popup").classList.add("hidden");
      document.getElementById("startBtn").classList.add("hidden");

      questionPool = [...questions].sort(() => Math.random() - 0.5);
      loadNextQuestion();

      gameTimer = setInterval(() => {
        if (!isPaused) {
          gameTimeLeft -= 0.1;
          document.getElementById("gameTime").textContent = gameTimeLeft.toFixed(1);

          if (gameTimeLeft <= 10) {
            document.getElementById("gameTime").classList.add("danger");
          }

          if (gameTimeLeft <= 0) {
            endGame();
          }
        }
      }, 100);

      questionTimer = setInterval(() => {
        if (!isPaused) {
          questionTimeLeft -= 0.1;
          document.getElementById("questionTime").textContent = questionTimeLeft.toFixed(1);

          if (questionTimeLeft <= 0) {
            handleAnswer(null, true);
          }
        }
      }, 100);
    }

    function loadNextQuestion() {
      if (questionPool.length === 0) {
        questionPool = [...questions].sort(() => Math.random() - 0.5);
      }

      hasAnswered = false;
      questionTimeLeft = 5;
      questionCount++;

      currentQuestion = questionPool.pop();

      document.getElementById("questionNo").textContent = questionCount;
      document.getElementById("questionText").textContent = currentQuestion.question;
      document.getElementById("questionTime").textContent = "5.0";

      const optionsDiv = document.getElementById("options");
      optionsDiv.innerHTML = "";

      currentQuestion.options.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.textContent = String.fromCharCode(65 + index) + ". " + option;
        btn.onclick = () => handleAnswer(index, false);
        optionsDiv.appendChild(btn);
      });
    }

    function handleAnswer(selectedIndex, isTimeout) {
      if (hasAnswered) return;
      hasAnswered = true;
      isPaused = true;

      const correct = selectedIndex === currentQuestion.answer;

      if (correct) {
        score++;
        currentStreak++;
        if (currentStreak > bestStreak) bestStreak = currentStreak;
      } else {
        currentStreak = 0;
      }

      document.getElementById("score").textContent = score;

      if (isTimeout) {
        showResult("⏰ 時間到！", "timeout");
      } else if (correct) {
        showResult("✅ 答對！GOAL!", "correct");
      } else {
        showResult("❌ 答錯！MISS!", "wrong");
      }

      setTimeout(() => {
        document.getElementById("popup").classList.add("hidden");

        if (gameTimeLeft <= 0) {
          endGame();
        } else {
          loadNextQuestion();
          isPaused = false;
        }
      }, 1000);
    }

    function showResult(title, type) {
      const popupTitle = document.getElementById("popupTitle");
      popupTitle.textContent = title;
      popupTitle.className = "result-title " + type;

      document.getElementById("correctAnswerText").textContent =
        currentQuestion.options[currentQuestion.answer];

      document.getElementById("startBtn").classList.add("hidden");
      document.getElementById("popup").classList.remove("hidden");
    }

    function endGame() {
      clearInterval(gameTimer);
      clearInterval(questionTimer);

      document.getElementById("game").classList.add("hidden");
      document.getElementById("end").classList.remove("hidden");

      document.getElementById("finalBadge").textContent = badgeNumber;
      document.getElementById("finalScore").textContent = score;
      document.getElementById("bestStreak").textContent = bestStreak;
    }
  </script>
</body>
</html>
